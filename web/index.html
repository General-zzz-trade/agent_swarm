<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolt — AI Coding Agent</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-icon">&#9889;</span><div><h1>Bolt</h1><p class="brand-sub">AI Coding Agent</p></div></div>
      <section class="panel">
        <h2>Status</h2>
        <div class="meta-row"><span class="ml">Model</span><span id="status-model" class="mv">-</span></div>
        <div class="meta-row"><span class="ml">State</span><span id="status-busy" class="mv">Idle</span></div>
      </section>
      <section class="panel">
        <h2>Quick Actions</h2>
        <div class="quick-actions">
          <button class="qa" data-prompt="List the files in the current directory">List files</button>
          <button class="qa" data-prompt="Read src/main.cpp and explain it">Read main.cpp</button>
          <button class="qa" data-prompt="Search for TODO comments in the codebase">Find TODOs</button>
          <button class="qa" data-prompt="Use build_and_test to verify the project">Build &amp; Test</button>
          <button class="qa" data-prompt="Use code_intel to find the definition of Agent">Find Agent class</button>
        </div>
      </section>
      <div class="sidebar-footer">
        <button id="clear-button" class="btn-s">Clear History</button>
      </div>
    </aside>
    <main class="main">
      <section id="messages" class="messages">
        <div class="message system"><div class="msg-body"><p>Welcome to <strong>Bolt</strong>. Ask me to read, write, search, build, or test code.</p></div></div>
      </section>
      <div id="streaming-indicator" class="streaming-indicator hidden"><span class="dot-pulse"></span> Thinking...</div>
      <form id="composer" class="composer">
        <textarea id="message-input" placeholder="Ask Bolt anything... (Enter to send)" rows="1"></textarea>
        <button id="send-button" type="submit" class="btn-send" title="Send">&#9654;</button>
      </form>
    </main>
  </div>
  <section id="approval-sheet" class="approval-sheet hidden">
    <div class="approval-card">
      <h3>Approval Required</h3>
      <p id="approval-tool">Tool: -</p><p id="approval-reason">-</p>
      <pre id="approval-details"></pre>
      <div class="approval-actions">
        <button id="deny-button" class="btn-s">Deny</button>
        <button id="approve-button" class="btn-p">Approve</button>
      </div>
    </div>
  </section>
  <script src="/app.js"></script>
</body>
</html>
