name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            ext: .exe
          # - os: ubuntu-latest
          #   name: linux-x64
          #   ext: ""
          # - os: macos-latest
          #   name: macos-arm64
          #   ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -S . -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j4 --config Release

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          ./build/kernel_tests.exe
          ./build/agent_integration_tests.exe
          ./build/capability_tests.exe

      - name: Package binary
        run: |
          cp build/mini_nn${{ matrix.ext }} agent-swarm-${{ matrix.name }}${{ matrix.ext }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: agent-swarm-${{ matrix.name }}${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
