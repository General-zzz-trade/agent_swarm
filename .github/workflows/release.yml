name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Job 1: Build C++ CLI binaries for all platforms
  build-cli:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            ext: .exe
          - os: ubuntu-latest
            name: linux-x64
            ext: ""
          - os: macos-latest
            name: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-curl make

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libcurl4-openssl-dev

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake -B build -S . -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build -j4 --target bolt

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) --target bolt

      - name: Package CLI binary
        run: cp build/bolt${{ matrix.ext }} bolt-${{ matrix.name }}${{ matrix.ext }}

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: bolt-${{ matrix.name }}${{ matrix.ext }}

  # Job 2: Build Tauri desktop app for all platforms
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
          - os: ubuntu-latest
            name: linux-x64
          - os: macos-latest
            name: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: bolt-ui
        run: npm ci

      - name: Build Tauri app
        working-directory: bolt-ui
        run: npx @tauri-apps/cli build

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: |
            bolt-ui/src-tauri/target/release/bundle/nsis/*.exe
            bolt-ui/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Linux packages
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: |
            bolt-ui/src-tauri/target/release/bundle/appimage/*.AppImage
            bolt-ui/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload macOS installer
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: bolt-ui/src-tauri/target/release/bundle/dmg/*.dmg

  # Job 3: Create GitHub Release with all artifacts
  create-release:
    needs: [build-cli, build-desktop]
    if: always() && needs.build-cli.result == 'success' && needs.build-desktop.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cli-*/*
            artifacts/desktop-*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 4: Publish npm package
  npm-publish:
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update package version from tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          cd npm
          node -e "const p=require('./package.json'); p.version='${VERSION}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish to npm
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
