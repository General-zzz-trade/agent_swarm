name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake make

      - name: Configure CMake
        run: cmake -B build -S . -G "MinGW Makefiles"

      - name: Build all targets
        run: cmake --build build -j4

      - name: Run kernel tests
        run: ./build/kernel_tests.exe

      - name: Run integration tests
        run: ./build/agent_integration_tests.exe

      - name: Run capability tests
        run: ./build/capability_tests.exe
        timeout-minutes: 2

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bolt-windows-x64
          path: build/bolt.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run kernel tests
        run: ./build/kernel_tests
        continue-on-error: true

      - name: Run capability tests
        run: ./build/capability_tests
        timeout-minutes: 2
        continue-on-error: true

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)
