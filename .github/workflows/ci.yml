name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build all targets
        run: cmake --build build --config Release -j4

      - name: Run kernel tests
        run: ./build/Release/kernel_tests.exe
        continue-on-error: true

      - name: Run integration tests
        run: ./build/Release/agent_integration_tests.exe
        continue-on-error: true

      - name: Run capability tests
        run: ./build/Release/capability_tests.exe
        timeout-minutes: 2
        continue-on-error: true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-windows-x64
          path: build/Release/mini_nn.exe
        continue-on-error: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run kernel tests
        run: ./build/kernel_tests
        continue-on-error: true

      - name: Run capability tests
        run: ./build/capability_tests
        timeout-minutes: 2
        continue-on-error: true

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)
