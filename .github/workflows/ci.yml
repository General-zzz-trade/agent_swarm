name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-curl make

      - name: Configure CMake
        run: cmake -B build -S . -G "MinGW Makefiles"

      - name: Build all targets
        run: cmake --build build -j4

      - name: Run kernel tests
        run: ./build/kernel_tests.exe

      - name: Run integration tests
        run: ./build/agent_integration_tests.exe

      - name: Run capability tests
        run: ./build/capability_tests.exe
        timeout-minutes: 2

      - name: Run e2e tests
        run: ./build/e2e_tests.exe

      - name: Run SSE parser tests
        run: ./build/sse_parser_tests.exe

      - name: Run MCP server tests
        run: ./build/mcp_server_tests.exe

      - name: Run approval provider tests
        run: ./build/approval_provider_tests.exe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bolt-windows-x64
          path: build/bolt.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libcurl4-openssl-dev bubblewrap

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run kernel tests
        run: ./build/kernel_tests

      - name: Run integration tests
        run: ./build/agent_integration_tests

      - name: Run capability tests
        run: ./build/capability_tests
        timeout-minutes: 2

      - name: Run e2e tests
        run: ./build/e2e_tests

      - name: Run SSE parser tests
        run: ./build/sse_parser_tests

      - name: Run MCP server tests
        run: ./build/mcp_server_tests

      - name: Run approval provider tests
        run: ./build/approval_provider_tests

  sanitizer-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libcurl4-openssl-dev

      - name: Configure CMake with sanitizers
        run: cmake -B build -S . -DENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run kernel tests
        run: ./build/kernel_tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

      - name: Run integration tests
        run: ./build/agent_integration_tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

      - name: Run capability tests
        run: ./build/capability_tests
        timeout-minutes: 5
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

      - name: Run e2e tests
        run: ./build/e2e_tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

      - name: Run SSE parser tests
        run: ./build/sse_parser_tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

      - name: Run MCP server tests
        run: ./build/mcp_server_tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

      - name: Run approval provider tests
        run: ./build/approval_provider_tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run kernel tests
        run: ./build/kernel_tests

      - name: Run integration tests
        run: ./build/agent_integration_tests

      - name: Run capability tests
        run: ./build/capability_tests
        timeout-minutes: 2

      - name: Run e2e tests
        run: ./build/e2e_tests

      - name: Run SSE parser tests
        run: ./build/sse_parser_tests

      - name: Run MCP server tests
        run: ./build/mcp_server_tests

      - name: Run approval provider tests
        run: ./build/approval_provider_tests
